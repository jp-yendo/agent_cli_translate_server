appId: com.agentclitranslateserver.app
productName: Agent CLI Translate Server
directories:
  output: release
  buildResources: build
artifactName: "agent-cli-translate-server-${version}-${os}-${arch}.${ext}"
afterAllArtifactBuild: scripts/zip-portable.js
portable:
  artifactName: "agent-cli-translate-server-${version}-${os}-${arch}-portable.${ext}"
  buildUniversalInstaller: false
publish:
  provider: github
  owner: jp-yendo
  repo: agent_cli_translate_server
  releaseType: draft
releaseInfo:
  releaseName: "v${version}"
  releaseNotes: |
    ## New Features

    -

    ## Bug Fixes

    -

files:
  - dist/**/*
  - public/**/*
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"

win:
  icon: public/icon.ico
  executableName: agent_cli_translate_server
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64

nsis:
  shortcutName: Agent CLI Translate Server
  buildUniversalInstaller: false
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: true

mac:
  category: public.app-category.developer-tools
  icon: public/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

linux:
  icon: public/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  desktop:
    entry:
      Name: Agent CLI Translate Server
      Comment: "AI translation server for XUnity.AutoTranslator CustomTranslate."
      Categories: Development;
